[Wrecking:Vehicles]
; How much Heat (in levels) racers gain / lose from wrecking a given cop vehicle.
;
; ■ FORMAT: pvehicle = heatChange (-> "default" if omitted)
;
; • These Heat changes are on top of the "[Heat:Wrecking]" settings above. 
; • Whenever a racer is in "COOLDOWN" mode, wrecking cop vehicles doesn't affect Heat.
; • If you define no valid Heat changes and no "default" value, Bartender disables this feature.
; • A Heat change can only be valid if its vehicle is also valid.
; • Bartender always respects the current Heat-level limits as defined in VltEd.
; • Negative values make wrecking cops of those types decrease Heat instead.
; • Each value must be a decimal or whole number.
; • You can define a "default" value.

; Vehicles without explicit Heat changes (uncomment to enable)
; default = 0.0

; Regular patrol cars (uncomment to enable)
; copmidsize  = 0.0
; copghost    = 0.0
; copgto      = 0.0
; copgtoghost = 0.0

; Elite street-racing unit (uncomment to enable)
; copsporthench = 0.0
; copsportghost = 0.0
; copsport      = 0.0

; Heavy support units (uncomment to enable)
; copsuv       = 0.0
; copsuvl      = 0.0
; copsuvpatrol = 0.0

; Sergeant Cross (uncomment to enable)
; copcross = 0.0

; Helicopter (uncomment to enable)
; copheli = 0.0






; ── ■ │ VEHICLE COLLISIONS │ ■ ───────────────────────────────────────────────────────────────────

[Heat:Collisions]
; How much Heat (in levels) racers gain / lose from colliding with other vehicles.
;
; ■ FORMAT: heatXY = {cop, traffic}HeatChange (FREE-ROAM; -> "default" if omitted)
;           raceXY = {cop, traffic}HeatChange (RACES;     -> "heatXY"  if omitted)
;
; • These Heat changes are on top of the "[Collisions:Assault]" settings below.
; • Whenever a racer is in "COOLDOWN" mode, vehicle collisions don't affect Heat.
; • The game counts these collisions only once per cop / traffic car.
; • The game counts these collisions regardless of who's at fault.
; • For races, this feature requires the vanilla game to track collisions in races.
; • See the "General.ini" file of the "Basic" feature set to enable tracking in races.
; • Bartender always respects the current Heat-level limits as defined in VltEd.
; • Negative values make collisions decrease Heat instead.
; • Each value must be a decimal or whole number.
; • You can define a "default" value pair.

