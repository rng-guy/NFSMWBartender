[Collisions:Assault]
; How much Heat (in levels) racers gain / lose from assaulting a cop vehicle.
;
; ■ FORMAT: heatXY = heatChange, onlyOncePerCop (FREE-ROAM; -> "default" if omitted)
;           raceXY = heatChange, onlyOncePerCop (RACES;     -> "heatXY"  if omitted)
;
; • These Heat changes are on top of the "[Heat:Collisions]" settings above.
; • Whenever a racer is in "COOLDOWN" mode, assaulting cop vehicles doesn't affect Heat.
; • The conditions for assault are the same as those for the "ramming a cop" infraction.
; • The game can be rather inconsistent at judging whether a collision counts as assault.
; • Bartender always respects the current Heat-level limits as defined in VltEd.
; • Negative values make assaulting cop vehicles decrease Heat instead.
; • Each Heat-change value must be a decimal or whole number.
; • Each repetition flag must be either "true" or "false"
; • You can define a "default" value pair.

