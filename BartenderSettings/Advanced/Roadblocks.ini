
; This file defines roadblock behaviour and what roadblock setups can spawn in pursuits.
;
; For the TECHNICAL DETAILS AND LIMITATIONS of the features in here, see the "APPENDIX.txt" file.
; The UNEDITED VALUES in this file mostly resemble the game's vanilla (i.e. unmodified) values.
;
; BEFORE YOU CHANGE OR ADD any roadblock setups, you should first understand how
; Bartender decides which roadblock setup to spawn following a roadblock request:
;  1) • the game picks a spawn location and a car budget,
;  2) • Bartender removes all setups that contain too many cars,
;  3) • Bartender removes all setups that don't match the requested spike-strip setting,
;  4) • Bartender removes all setups whose min. road width is >  the spawn location's width,
;  5) • Bartender removes all setups whose max. road width is <= the spawn location's width,
;  6) • Bartender chooses a random setup from those remaining through a "chance"-weighted roll,
;  7) • Bartender returns either the standard or mirrored version of the chosen setup, and
;  8) • the game re-scales (i.e. stretches) the returned setup by up to 14% if there's room.
;
; TO ADD a new roadblock setup to the game:
;  1) • design your setup with Bartender's "RoadblockEditor.html" file in any browser,
;  2) • copy the contents of the "Bartender settings" field below the roadblock preview,
;  3) • think of a unique name (e.g. "Custom01") for your new roadblock setup,
;  4) • create a new parameter group called "[Setups:Custom01]" in this .ini file,
;  5) • paste the roadblock settings from the editor under this new parameter group,
;  6) • (optional) adjust the upper "extent" width value to control possible spawn locations,
;  7) • (optional) define a "stretch" flag value to toggle coverage-based width stretching,
;  8) • (optional) define a "mirror" probability value to control mirrored setup spawns, and
;  9) • (optional) define "heatXY" / "raceXY" spawn-chance values to fine-tune the spawn rate.
;
; The OPTIONAL "CHANCE" VALUES for roadblock setups are weights, not percentages; they work
; just like the "chance" values the game uses for cop spawns: The actual spawn chance of a 
; roadblock setup is its "chance" value divided by the sum of the "chance" values of all
; roadblocks that (also) fulfil the requirements for the game's current roadblock request.
; A "chance" value of 0 means the roadblock setup never appears at a given Heat level.
;
; Common ROAD WIDTHS (in metres) for spawn points are:
;  •  6-10 (very narrow roads),
;  • 11-12 (narrow city roads),
;  • 13-16 (city roads with narrow sidewalks),
;  • 19-20 (city roads with wide sidewalks),
;  • 24-32 (highways without a median), and
;  • 32-50 (highways with a median).
;
; Common CAR BUDGETS outside of highways are 4-5 cars.






