[Roadblocks:Radio]
; How likely (in percent) the cops are to call out roadblocks / spikes over the radio.
;
; ■ FORMAT: heatXY = {spawn, spike}CalloutProbability (FREE-ROAM; -> "default" if omitted)
;           raceXY = {spawn, spike}CalloutProbability (RACES;     -> "heatXY"  if omitted)
;
; • "spawnCalloutProbability" is the likelihood of roadblock-spawn callouts in general.
; • "spikeCalloutProbability" is the likelihood of spike-placement callouts specifically.
; • Spike-placement callouts also require the "spawnCalloutProbability" check to succeed.
; • Due to some scheduling quirks, callouts may play less frequently than expected.
; • Each value must be a decimal or whole number between 0 and 100 (inclusive).
; • You can define a "default" value pair.

default = 100.0, 50.0

heat01 = 100.0, 50.0
