; ── ■ │ CUSTOM SETUPS │ ■ ────────────────────────────────────────────────────────────────────────

[Setups:Example]
; READ THE COMMENTS AT THE TOP OF THIS FILE BEFORE YOU CHANGE / ADD ANYTHING!
;
; Settings (all widths and offsets in metres) for the custom "Example" roadblock setup.
;
; ■ FORMAT: extent = {min, max}RoadWidth
;
;           partXY = typeID, {horizontal, vertical}Offset, orientation
;
;           stretch = isEnabled
;           mirror  = probability
;
;           heatXY = chance (FREE-ROAM; -> "default" if omitted)
;           raceXY = chance (RACES;     -> "heatXY"  if omitted)
;   
; • Bartender ignores roadblock setups without exactly two extent values.
; • Bartender ignores roadblock setups where "minRoadWidth" >= "maxRoadWidth".
; • Bartender ignores roadblock setups which don't contain at least one car.
; • Bartender only tries to parse part01 through 06 of each roadblock setup.
; • The greater the width range, the higher the chance of more empty space.
; • The smaller the width range, the fewer eligible spawn locations for the setup.
; • If you don't define a setting flag for width stretching, Bartender uses "true".
; • If you don't define a mirror probability (in percent), Bartender uses 50.
; • If you don't define a "default" spawn-chance value, Bartender uses 100.
; • Each type ID must be either 0 (none), 1 (car), 2 (sawhorse), or 3 (spikes).
; • Each width, offset, and orientation must be a decimal or whole number.
; • The setting flag for width stretching must be either "true" or "false".
; • The mirror probability must be a decimal or whole number between 0 and 100 (inclusive).
; • Each spawn-chance value must be a non-negative whole number.
; • You can define a "default" spawn-chance value.

; Uncomment the extent and part values to enable this setup
; extent = 16.40, 22.00

; part01 = 1,  5.51,  1.50, 0.681
; part02 = 1, -6.54,  0.00, 0.542
; part03 = 3, -1.54,  2.50, 0.500
; part04 = 1, -2.04, -1.50, 0.181
; part05 = 1,  2.46, -1.00, 0.625

; Uncomment these values to customise spawn behaviour
; stretch = true
; mirror  = 50.0

