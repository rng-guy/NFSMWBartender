[Joining:Limit]
; How many vehicles that joined from roadblocks can be active in a pursuit in total.
;
; ■ FORMAT: heatXY = totalJoinLimit (FREE-ROAM)
;           raceXY = totalJoinLimit (RACES)
;
; • To enable joining from roadblocks, see the "Supports.ini" file of the "Basic" feature set.
; • Joining from roadblocks is limited only at Heat levels for which you define valid limit values.
; • This limit for joining from roadblocks still applies with independent "Chasers" spawns enabled.
; • Each value must be a non-negative whole number.
; • You can't define a "default" value.

