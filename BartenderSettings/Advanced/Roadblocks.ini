[Joining:Fleeing]
; Delay interval (in seconds) and "Chasers" threshold for joined roadblock vehicles to flee.
;
; ■ FORMAT: heatXY = {min, max}FleeDelay, chasersThreshold (FREE-ROAM)
;           raceXY = {min, max}FleeDelay, chasersThreshold (RACES)
;
; • To enable joining from roadblocks, see the "Supports.ini" file of the "Basic" feature set.
; • Joined vehicles flee only at Heat levels for which you define valid delay and threshold values.
; • Joined vehicles flee only while the number of active "Chasers" is above the threshold.
; • Flee delays are random numbers between "minFleeDelay" and "maxFleeDelay".
; • Each delay value must be a non-negative decimal or whole number.
; • Each threshold value must be a non-negative whole number.
; • You can't define a "default" value tuple.

