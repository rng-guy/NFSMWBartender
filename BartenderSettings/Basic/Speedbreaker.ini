[Wrecking:Vehicles]
; How much speedbreaker charge (in seconds) you gain / lose from wrecking a given cop vehicle.
;
; ■ FORMAT: pvehicle = chargeChange (-> "default" if omitted)
;
; • These charge changes are on top of the "[Speedbreaker:Wrecking]" settings above.
; • To restrict charge changes, see the "[Wrecking:Gains]" and "[Wrecking:Losses]" settings below.
; • For races, this feature requires the vanilla game to track the number of cops wrecked in races.
; • See the "[Pursuits:Races]" settings in the "General.ini" file to enable tracking in races.
; • Bartender always respects the Speedbreaker's hard-coded charge limits.
; • Negative values make destroying cops of those types decrease charge instead.
; • Each value must be a decimal or whole number.
; • You can define a "default" value.

; Vehicles without explicit charge changes (uncomment to enable)
; default = 0.0

; Regular patrol cars (uncomment to enable)
; copmidsize  = 0.0
; copghost    = 0.0
; copgto      = 0.0
; copgtoghost = 0.0

; Elite street-racing unit (uncomment to enable)
; copsporthench = 0.0
; copsportghost = 0.0
; copsport      = 0.0

; Heavy support units (uncomment to enable)
; copsuv       = 0.0
; copsuvl      = 0.0
; copsuvpatrol = 0.0

; Sergeant Cross (uncomment to enable)
; copcross = 0.0

; Helicopter (uncomment to enable)
; copheli = 0.0




