[Speedbreaker:Mechanics]
; Whether the Speedbreaker's vanilla recharging mechanics work in pursuits.
;
; ■ FORMAT: heatXY = {speed, drift}RechargeEnabled (FREE-ROAM; -> "default" if omitted)
;           raceXY = {speed, drift}RechargeEnabled (RACES;     -> "heatXY"  if omitted)
;
; • In the vanilla game, you can recharge the Speedbreaker by driving fast or drifting.
; • Each value must be either "true" or "false".
; • You can define a "default" value pair.

